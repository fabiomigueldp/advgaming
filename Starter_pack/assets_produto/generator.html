<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
        }

        .artboard {
            width: 1280px;
            height: 720px;
            background: #0f0f13;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            display: none;
            /* Hidden by default */
        }

        .artboard.active {
            display: flex;
            flex-direction: column;
        }

        /* --- UTILS --- */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .glow-spot {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            z-index: 10;
            position: relative;
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 90px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            color: white;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            letter-spacing: -2px;
        }

        h2 {
            font-size: 36px;
            font-weight: 700;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 20px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .badge.highlight {
            background: linear-gradient(135deg, #FF0055, #FF4400);
            border: none;
            box-shadow: 0 5px 15px rgba(255, 68, 0, 0.3);
        }

        /* --- SCENE 1: MAIN THUMBNAIL --- */
        #thumb-main {
            background: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #050508 100%);
        }

        #thumb-main .glow-spot {
            background: #6a0dad;
            top: -200px;
            right: -200px;
        }

        #thumb-main .glow-spot-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: #ff0055;
            bottom: -200px;
            left: -200px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }

        #thumb-main .text-area {
            position: absolute;
            top: 140px;
            left: 80px;
            max-width: 550px;
        }

        #thumb-main .subv {
            font-size: 24px;
            color: #ccc;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #thumb-main .subv::before {
            content: '';
            width: 40px;
            height: 2px;
            background: #FF0055;
            display: block;
        }

        .iso-deck {
            position: absolute;
            top: 60px;
            right: -100px;
            width: 900px;
            height: 800px;
            perspective: 1500px;
            transform: scale(0.9);
        }

        .iso-card {
            position: absolute;
            width: 640px;
            height: 360px;
            background: #000;
            border-radius: 8px;
            box-shadow: -30px 30px 70px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .iso-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-1 {
            transform: rotateY(-25deg) rotateX(15deg) translateZ(120px);
            top: 220px;
            left: 180px;
            z-index: 3;
            border: 2px solid rgba(255, 0, 85, 0.4);
        }

        .card-2 {
            transform: rotateY(-25deg) rotateX(15deg) translateZ(0px);
            top: 110px;
            left: 280px;
            z-index: 2;
            filter: brightness(0.6);
        }

        .card-3 {
            transform: rotateY(-25deg) rotateX(15deg) translateZ(-120px);
            top: 0px;
            left: 380px;
            z-index: 1;
            filter: brightness(0.4);
        }

        .features {
            display: flex;
            gap: 12px;
            margin-top: 35px;
        }

        /* --- SCENE 2: COLORS --- */
        #thumb-colors {
            background: #080808;
        }

        .color-strips {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .strip {
            flex: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .strip:last-child {
            border-right: none;
        }

        .strip img {
            height: 100%;
            width: auto;
            min-width: 400px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            object-fit: cover;
            filter: brightness(0.8);
        }

        .strip-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding-bottom: 40px;
            padding-top: 80px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 12, 0.9);
            padding: 30px 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }

        .title-overlay h1 {
            font-size: 60px;
            margin-bottom: 5px;
        }

        .title-overlay h2 {
            font-size: 24px;
            color: #ff0055;
        }

        /* --- SCENE 3-5: INDIVIDUAL SCREENS --- */
        .showcase {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a1e 0%, #000 100%);
            padding: 0;
            position: relative;
        }

        .showcase-bg {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            background-size: cover;
            background-position: center;
            filter: blur(20px);
        }

        .laptop-frame {
            width: 1040px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 4px;
            box-shadow: 0 0 0 2px #333, 0 40px 100px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .laptop-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .label-floater {
            position: absolute;
            bottom: 50px;
            right: 50px;
            background: white;
            color: black;
            padding: 15px 40px;
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
            clip-path: polygon(10% 0, 100% 0, 100% 100%, 0% 100%);
        }

        /* --- CAPTURE FIX --- */
        /* Used when screenshotting to ensure fullscreen */
        .capture-mode body,
        .capture-mode html {
            width: 1280px !important;
            height: 720px !important;
            overflow: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .capture-mode .artboard.active {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 1280px !important;
            height: 720px !important;
            z-index: 99999 !important;
        }
    </style>
</head>

<body>

    <div class="canvas-container">

        <!-- THUMBNAIL MAIN -->
        <div id="thumb-main" class="artboard">
            <div class="bg-grid"></div>
            <div class="glow-spot"></div>
            <div class="glow-spot-2"></div>

            <div class="content">
                <div class="text-area">
                    <div class="subv"><span id="txt-platform">Twitch & Youtube</span></div>
                    <h1 id="txt-title">STREAM<br>PACK</h1>
                    <h2 id="txt-subtitle" style="color: #BA55D3; margin-top: 15px;">Pro Overlays</h2>

                    <div class="features">
                        <div class="badge" id="badge-colors">5 Colors</div>
                        <div class="badge highlight" id="badge-obs">Ready for OBS</div>
                    </div>
                </div>

                <div class="iso-deck">
                    <div class="iso-card card-3">
                        <img src="src_img/waiting_purple.png" alt="Waiting">
                    </div>
                    <div class="iso-card card-2">
                        <img src="src_img/offline_purple.png" alt="Offline">
                    </div>
                    <div class="iso-card card-1">
                        <img src="src_img/stream_purple.png" alt="Stream">
                    </div>
                </div>
            </div>
        </div>

        <!-- THUMBNAIL COLORS -->
        <div id="thumb-colors" class="artboard">
            <div class="color-strips">
                <div class="strip">
                    <img src="src_img/stream_yellow.png">
                    <div class="strip-label" data-key="yellow">Yellow</div>
                </div>
                <div class="strip">
                    <img src="src_img/stream_blue.png">
                    <div class="strip-label" data-key="blue">Blue</div>
                </div>
                <div class="strip">
                    <img src="src_img/stream_purple.png">
                    <div class="strip-label" data-key="purple">Purple</div>
                </div>
                <div class="strip">
                    <img src="src_img/stream_green.png">
                    <div class="strip-label" data-key="green">Green</div>
                </div>
                <div class="strip">
                    <img src="src_img/stream_red.png">
                    <div class="strip-label" data-key="red">Red</div>
                </div>
            </div>
            <div class="title-overlay">
                <h1 id="txt-var-title">5 VARIATIONS</h1>
                <h2 id="txt-var-sub">CHOOSE YOUR VIBE</h2>
            </div>
        </div>

        <!-- THUMBNAIL STREAM -->
        <div id="thumb-stream" class="artboard showcase">
            <div class="bg-grid"></div>
            <div class="showcase-bg" style="background-image: url('src_img/stream_purple.png');"></div>
            <div class="laptop-frame">
                <div
                    style="position:absolute; inset:0; background: linear-gradient(45deg, #222, #333); display: flex; align-items:center; justify-content:center; color:#555; font-size: 50px; font-weight:900;">
                    GAMEPLAY</div>
                <img src="src_img/stream_purple.png" style="position:relative; z-index:2;">
            </div>
            <div class="label-floater" id="lbl-stream">In-Game Overlay</div>
        </div>

        <!-- THUMBNAIL OFFLINE -->
        <div id="thumb-offline" class="artboard showcase">
            <div class="bg-grid"></div>
            <div class="showcase-bg" style="background-image: url('src_img/offline_purple.png');"></div>
            <div class="laptop-frame">
                <img src="src_img/offline_purple.png">
            </div>
            <div class="label-floater" id="lbl-offline">Offline Screen</div>
        </div>

        <!-- THUMBNAIL WAITING -->
        <div id="thumb-waiting" class="artboard showcase">
            <div class="bg-grid"></div>
            <div class="showcase-bg" style="background-image: url('src_img/waiting_purple.png');"></div>
            <div class="laptop-frame">
                <img src="src_img/waiting_purple.png">
            </div>
            <div class="label-floater" id="lbl-waiting">Starting Soon</div>
        </div>

    </div>

    <script>
        // Use Hash instead of Search for file:// compatibility
        // format: #id=val&lang=val
        const getHashParams = () => {
            const hash = window.location.hash.substring(1); // remove #
            const p = new URLSearchParams(hash);
            return p;
        };
        const params = getHashParams();
        const targetId = params.get('id');
        const lang = params.get('lang') || 'en';

        // TRANSLATIONS
        const dict = {
            'en': {
                'txt-platform': 'Twitch, YT & Kick',
                'txt-title': 'STARTER<br>PACK',
                'txt-subtitle': 'Essential & Free',
                'badge-colors': '3 Screens',
                'badge-obs': 'Free Download',

                'txt-var-title': '5 COLORS',
                'txt-var-sub': 'CHOOSE YOUR STYLE',

                'color-yellow': 'Yellow',
                'color-blue': 'Blue',
                'color-purple': 'Purple',
                'color-green': 'Green',
                'color-red': 'Red',

                'lbl-stream': 'In-Game Overlay',
                'lbl-offline': 'Offline Screen',
                'lbl-waiting': 'Starting Soon'
            },
            'pt': {
                'txt-platform': 'Twitch, YT & Kick',
                'txt-title': 'STARTER<br>PACK',
                'txt-subtitle': 'Essencial e Grátis',
                'badge-colors': '3 Telas',
                'badge-obs': 'Download Grátis',

                'txt-var-title': '5 CORES',
                'txt-var-sub': 'ESCOLHA SEU ESTILO',

                'color-yellow': 'Amarelo',
                'color-blue': 'Azul',
                'color-purple': 'Roxo',
                'color-green': 'Verde',
                'color-red': 'Vermelho',

                'lbl-stream': 'Overlay de Jogo',
                'lbl-offline': 'Tela Offline',
                'lbl-waiting': 'Já Voltamos'
            }
        };

        const t = dict[lang];
        if (t) {
            const setHtml = (id, val) => { const el = document.getElementById(id); if (el) el.innerHTML = val; };
            const setText = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
            setHtml('txt-title', t['txt-title']);
            setText('txt-platform', t['txt-platform']);
            setText('txt-subtitle', t['txt-subtitle']);
            setText('badge-colors', t['badge-colors']);
            setText('badge-obs', t['badge-obs']);
            setText('txt-var-title', t['txt-var-title']);
            setText('txt-var-sub', t['txt-var-sub']);
            setText('lbl-stream', t['lbl-stream']);
            setText('lbl-offline', t['lbl-offline']);
            setText('lbl-waiting', t['lbl-waiting']);
            document.querySelectorAll('.strip-label').forEach(el => {
                const k = el.getAttribute('data-key');
                if (k && t['color-' + k]) el.innerText = t['color-' + k];
            });
        }

        // VIEW LOGIC
        if (targetId) {
            document.documentElement.classList.add('capture-mode');
            document.body.classList.add('capture-mode');

            document.querySelectorAll('.artboard').forEach(el => {
                if (el.id === targetId) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                    el.style.display = 'none';
                }
            });
        } else {
            document.getElementById('thumb-main').classList.add('active');
        }
    </script>
</body>

</html>
